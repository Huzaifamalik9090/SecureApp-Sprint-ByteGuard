{% extends "base.html" %}
{% block content %}
<h2>Posts</h2>
{% for post in posts %}
<article>
    <h3>{{ post.title }}</h3>
    <p>{{ post.content }}</p>
    <small>Owner ID: {{ post.owner_id }}</small>
    {% if current_user.is_authenticated and current_user.id == post.owner_id %}
        <p>
            <a href="{{ url_for('posts.edit_post', post_id=post.id) }}">Edit</a>
        </p>
        <form method="post" action="{{ url_for('posts.delete_post', post_id=post.id) }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <button type="submit">Delete</button>
        </form>
    {% endif %}
</article>
<hr>
{% endfor %}
{% endblock %}
